name: Automated Data Preprocessing

on:
  push:
    branches:
      - main

jobs:
  preprocess-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run preprocessing script
        run: python preprocessing/automate_Lukman.py --input namadataset_raw/raw_data.csv --output preprocessing/namadataset_preprocessing/cleaned_data.csv

      - name: Commit and push preprocessed data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/namadataset_preprocessing/cleaned_data.csv
          if ! git diff --staged --quiet; then
            git commit -m "fix: clear syntax formatting in workflow pipeline"
            git push origin main
          else
            echo "No changes to commit."
          fi
